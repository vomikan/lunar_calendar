# ══════════════════════════════════════════════════════
#  Конфигурация лунного календаря
#  Файл: assets/config.toml
# ══════════════════════════════════════════════════════


# ── Вывод ──────────────────────────────────────────────
[output]
directory  = "output"  # папка для результатов


# ── Размеры ячеек и отступы ────────────────────────────
[layout]
cell_width    = 120     # ширина ячейки дня (px)
cell_height   = 90      # высота ячейки дня (px)
header_height = 44      # высота строки с днями недели (px)
moon_radius   = 18      # радиус иконки луны (px)
corner_radius = 10      # скругление углов ячеек (px)
cell_padding  = 6       # зазор между ячейками = просвет фона (px)
faded_opacity = 0.30    # прозрачность дней соседних месяцев


# ── Цвета фонов ────────────────────────────────────────
[colors.background]
page           = "#F7F3EC"          # фон страницы — почти белый, чуть тёплый
cell_weekday   = "#F0E2B6"          # будни — липовый мёд, светлый
cell_weekend   = "#F2C4A0"          # выходные — румяное яблоко, пастельный
header_weekday = "#E8D89A"          # шапка будни — мёд чуть насыщеннее
header_weekend = "#EDAA80"          # шапка выходные — яблоко чуть насыщеннее
grid_line      = "#F7F3EC"          # (не используется, оставлено для совместимости)
cell_shadow    = "rgba(0,0,0,0.07)" # мягкая тень


# ── Цвета текста ───────────────────────────────────────
[colors.text]
day_number_weekday = "#5C3D0A"   # цифра дня (будни) — тёплый коричневый
day_number_weekend = "#7A2E0A"   # цифра дня (выходные) — терракота
header_weekday     = "#6B4A10"   # шапка будни
header_weekend     = "#8B3510"   # шапка выходные


# ── Цвета иконки луны ──────────────────────────────────
[colors.moon]
dark  = "#B8925A"   # тёмная сторона — янтарь
light = "#FDF5E0"   # светлая сторона — лунный свет
ring  = "#9A7040"   # обводка


# ── Цвета слоя событий ─────────────────────────────────
[colors.events]
marker     = "#C8873A"   # маркер (не используется)
text       = "#6B2800"   # текст праздника — глубокий бордо-коричневый
text_faded = "#A07040"   # текст праздника для faded-дней


# ── Позиционирование событий ───────────────────────────
[events]
marker_offset = 36


# ── Шрифты шапки ───────────────────────────────────────
[fonts.header]
size           = 14
weight         = "bold"
letter_spacing = 2
family         = "Georgia, serif"


# ── Шрифты ячеек ───────────────────────────────────────
[fonts.day_number]
size   = 24
weight = "bold"

[fonts.event]
size        = 13
style       = "italic"
line_height = 14
max_chars   = 13
max_lines   = 3
